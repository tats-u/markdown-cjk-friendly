packages:
  - packages/*
  - integration_tests
  - demos/*
  - website

auditConfig:
  ignoreGhsas:
    # Both come from VitePress 1.6, which is just an example.
    - GHSA-4w7w-66w2-5vf9 # Vite 5 is too old (<6.4.2)
    - GHSA-67mh-4wv8-2f99 # esbuild 0.21 is too old (<0.25.0)
blockExoticSubdeps: true

catalog:
  '@astrojs/mdx': ^5.0.2
  '@mdx-js/mdx': ^3.1.1
  '@rspress/core>remark-cjk-friendly': 'workspace:'
  '@rspress/core>remark-cjk-friendly-gfm-strikethrough': 'workspace:'
  '@types/markdown-it': ^14.1.2
  '@types/node': ^24.12.2
  astro: ^6.1.10
  devlop: ^1.1.0
  get-east-asian-width: ^1.4.0
  markdown-it: ^14.1.1
  micromark: ^4.0.2
  micromark-extension-gfm: ^3.0.0
  micromark-util-chunked: ^2.0.1
  micromark-util-resolve-all: ^2.0.1
  micromark-util-symbol: ^2.0.1
  micromark-util-types: ^2.0.2
  npm-run-all2: ^8.0.4
  rehype-stringify: ^10.0.1
  remark: ^15.0.1
  remark-gfm: ^4.0.1
  remark-parse: ^11.0.0
  remark-rehype: ^11.1.2
  tsdown: ^0.18.1
  unified: ^11.0.5
dedupePeers: true

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - markdown-it@14.2.0

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  core-js-pure: true
  esbuild: true
  sharp: true

overrides:
  compression@1.8.0>on-headers: 1.1.0
  refractor@3.6.0>prismjs: ^1.30.0
  react-render-to-markdown@>=19 <19.1.0: ^19.1.0
  # Node 18 has been discarded since 7.x but not affected because 6.x is only used by example sites
  serialize-javascript@^6: ^7.0.4
  serve-handler@6.1.6>minimatch: ^3.1.3
  webpack-dev-server@^5>sockjs: "-" # Unsed by default: https://github.com/webpack/webpack-dev-server/issues/5662#issuecomment-4448722673

publicHoistPattern:
  - decode-named-character-reference
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200
trustPolicyExclude:
  - tinyexec@1.2.1
